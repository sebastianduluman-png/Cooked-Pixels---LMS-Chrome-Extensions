<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cooked Pixels</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <img src="icons/icon48.png" width="22" height="22" alt="Logo">
        </div>
        <div>
          <h1 class="title">Cooked Pixels <svg class="title-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 23c-3.866 0-7-2.686-7-6 0-2.418 1.137-4.073 2.5-5.5C9 10 10 8 10 5c0 0 2.5 2 3.5 5 .386 1.156.5 1.5.5 1.5s1-1 1-2.5c0 0 2 2 2 5 0 1-.5 2-1 3 2-2.5 3-3.5 3-5.5 0 0 1 1.5 1 4 0 3.314-3.134 7-8 7z" fill="#F6CF12"/><path d="M12 23c-2.21 0-4-1.343-4-3 0-1.4.778-2.368 1.5-3C10 16.5 10.5 16 10.5 14.5c0 0 .833.667 1.25 1.75.16.417.25.75.25.75s.5-.5.5-1.25c0 0 1 1 1 2.5 0 .5-.25 1-.5 1.5 1-1.25 1.5-2 1.5-3 0 0 .5.75.5 2 0 2.21-1.79 4.25-3.5 4.25z" fill="#FF6B35"/></svg></h1>
          <p class="subtitle" id="pageUrl">Ecommerce Events</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="exportBtn" title="Export Report">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </button>
        <button class="btn-icon btn-danger" id="clearBtn" title="Clear events">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Source Toggle -->
    <div class="source-toggle">
      <button class="source-btn active" data-source="all">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        All
      </button>
      <button class="source-btn" data-source="ga4">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="9" width="3" height="6" rx="1"/><rect x="6.5" y="5" width="3" height="10" rx="1"/><rect x="12" y="1" width="3" height="14" rx="1"/></svg>
        GA4
      </button>
      <button class="source-btn" data-source="gads">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 4.5l5 8h3l-5-8z"/><path d="M9.5 4.5l5 8h-3l-5-8z"/><circle cx="12" cy="12" r="2"/></svg>
        Google Ads
      </button>
      <button class="source-btn" data-source="fb">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M16 8a8 8 0 10-9.25 7.9v-5.59H4.72V8h2.03V6.27c0-2 1.2-3.12 3.02-3.12.88 0 1.8.16 1.8.16v1.97h-1.01c-1 0-1.31.62-1.31 1.26V8h2.22l-.36 2.31H9.25v5.59A8 8 0 0016 8z"/></svg>
        Meta
      </button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-chip active" data-filter="all">
        All <span class="chip-count" id="countAll">0</span>
      </button>
      <button class="filter-chip" data-filter="page_view">
        <span class="dot dot-pageview"></span> PageView
      </button>
      <button class="filter-chip" data-filter="view_item">
        <span class="dot dot-view"></span> View
      </button>
      <button class="filter-chip" data-filter="add_to_cart">
        <span class="dot dot-cart"></span> Cart
      </button>
      <button class="filter-chip" data-filter="begin_checkout">
        <span class="dot dot-checkout"></span> Checkout
      </button>
      <button class="filter-chip" data-filter="purchase">
        <span class="dot dot-purchase"></span> Purchase
      </button>
    </div>

    <!-- Event List -->
    <div class="event-list" id="eventList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <p class="empty-title">No events captured yet</p>
        <p class="empty-text">Navigate to a page with GA4, Google Ads, or Meta Pixel ecommerce tracking to see events appear here.</p>
      </div>
    </div>

    <!-- Status Bar -->
    <footer class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Listening for GA4, Google Ads &amp; Meta events...</span>
      <button class="check-view-btn" id="checkViewBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Check Events
      </button>
      <button class="insights-view-btn" id="insightsViewBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        Insights
      </button>
      <button class="consent-view-btn" id="consentViewBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Consent
      </button>
      <button class="pixel-view-btn" id="pixelViewBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 6a6 6 0 0 1 6 6"/><path d="M12 2a10 10 0 0 0-10 10"/><path d="M12 6a6 6 0 0 0-6 6"/></svg>
        Pixels
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
